# Enterprise SonarQube configuration for no-OS project
# Kubernetes deployment: k8s.secad.analog.com
# https://k8s.secad.analog.com/sonarqube

# Project identification
sonar.projectKey=no-OS
sonar.projectName=no-OS
sonar.projectDescription=Platform independent drivers for Analog Devices Inc. products
sonar.projectVersion=1.0

# Source configuration
sonar.sources=drivers,include,iio,jesd204,libraries,network
sonar.tests=tests

# Language settings
sonar.c.file.suffixes=.c
sonar.cpp.file.suffixes=.cpp,.cc,.cxx
sonar.objc.file.suffixes=.m

# Exclusions
sonar.exclusions=**/build/**,**/libraries/azure/**,**/libraries/mbed/**,**/libraries/mbedtls/**,**/tests/**/build/**,**/util/**
sonar.test.exclusions=**/build/**

# Coverage settings
sonar.coverage.gcov.xmlReportPaths=coverage/coverage.xml

# C/C++ analyzer settings
# Compile commands database (optional but improves analysis quality when available)
# sonar.cfamily.compile-commands=compile_commands.json
sonar.cfamily.cache.enabled=true
sonar.cfamily.threads=4

# Include paths for basic analysis (fallback when compile_commands.json not available)
sonar.cfamily.includeDirectories=include,drivers,iio,jesd204,libraries/free_rtos,libraries/fatfs
sonar.cfamily.defines=IIO_SUPPORT

# Build wrapper configuration (alternative approach)
# Can be used if compile_commands.json generation fails

# Analysis settings
sonar.scm.provider=git
sonar.sourceEncoding=UTF-8

# Quality gate enforcement
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300

# Project links
sonar.links.homepage=https://github.com/analogdevicesinc/no-OS
sonar.links.ci=https://github.com/analogdevicesinc/no-OS/actions
sonar.links.scm=https://github.com/analogdevicesinc/no-OS
sonar.links.issue=https://github.com/analogdevicesinc/no-OS/issues

# Enterprise SonarQube specific settings
# Host URL is set via command line or environment variable
# sonar.host.url=https://k8s.secad.analog.com/sonarqube

# Authentication handled via LDAP (users log in with ADI credentials)
# For CI/CD, use project-specific token instead of personal credentials
# sonar.token=${SONAR_TOKEN}

# Branch analysis settings (Enterprise feature)
# sonar.branch.name will be set dynamically in CI/CD pipeline
# sonar.branch.target=main

# Pull request analysis (Enterprise feature)
# sonar.pullrequest.key will be set dynamically for PR analysis
# sonar.pullrequest.branch will be set to PR source branch
# sonar.pullrequest.base will be set to PR target branch

# Community rules
sonar.issue.ignore.multicriteria=e1,e2,e3

# Rule e1: Ignore specific third-party library issues
sonar.issue.ignore.multicriteria.e1.ruleKey=*
sonar.issue.ignore.multicriteria.e1.resourceKey=**/libraries/**

# Rule e2: Ignore build artifacts
sonar.issue.ignore.multicriteria.e2.ruleKey=*
sonar.issue.ignore.multicriteria.e2.resourceKey=**/build/**

# Rule e3: Ignore test build artifacts
sonar.issue.ignore.multicriteria.e3.ruleKey=*
sonar.issue.ignore.multicriteria.e3.resourceKey=**/tests/**/build/**
